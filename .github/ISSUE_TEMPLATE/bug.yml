name: Bug report
description: Report a reproducible pTTY problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: doctor
    attributes:
      label: ptty-doctor output
      description: Run `ptty-doctor` on the affected machine and paste the full output.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands and keybindings where relevant.
      placeholder: |
        1. Install with ...
        2. Run ...
        3. Press ...
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal and SSH client
      placeholder: Windows Terminal, iTerm2, Ghostty, OpenSSH, etc.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or notes that may help.
    validations:
      required: false
