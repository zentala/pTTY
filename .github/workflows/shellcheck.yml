name: shellcheck

on:
  pull_request:
    paths:
      - "**/*.sh"
      - "install.sh"
      - "uninstall.sh"
      - "scripts/**"
      - "src/**/*.sh"
      - ".github/workflows/shellcheck.yml"
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - "install.sh"
      - "uninstall.sh"
      - "scripts/**"
      - "src/**/*.sh"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: |
            tests
            .plan
          # SC1091: don't follow sourced files (they may not be on the linter's PATH)
          # SC2086: word-splitting is intentional in some places
          # SC2155: declare-and-assign is fine for our use
          ignore_names: ""
        env:
          SHELLCHECK_OPTS: "-e SC1091 -e SC2155"
